name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang & Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          gleam-version: "1.14.0"
          rebar3-version: "3.24.0"

      - name: Build Project
        working-directory: ./demo
        run: |
          gleam deps download

          # 1. Build without the proctor (silences the WebSocket errors)
          # We still use --base-path /loom/ so internal links work
          gleam run -m lustre/dev build --minify --outdir dist --base-path /loom/ --detect-proctor false

          # 2. Safety check: ensure dist exists
          mkdir -p dist

          # 3. Flatten the JS: Lustre often puts it in dist/js/
          # We move it to the root of dist so index.html can see it
          find dist -name "*.js" -exec cp {} dist/demo.js \;

          # 4. Copy your custom HTML and assets to the root of dist
          cp index.html dist/index.html
          cp favicon.ico dist/favicon.ico || true

          # 5. DEBUG: Verify the structure in the logs
          echo "Deployment Structure:"
          ls -R dist/

          touch dist/.nojekyll
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./demo/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
