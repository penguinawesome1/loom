name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang & Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          gleam-version: "1.14.0"
          rebar3-version: "3.24.0"

      - name: Build Project
        working-directory: ./demo
        run: |
          gleam deps download

          # 1. Build the project
          gleam run -m lustre/dev build --minify --outdir dist --base-path /loom/ --detect-proctor false

          # 2. Force create the dist folder
          mkdir -p dist

          # 3. Find the compiled JS and move it to dist/demo.js
          # Lustre usually builds into demo/build/ or demo/priv/static/
          find . -name "*.js" -not -path "./dist/*" -exec cp {} dist/demo.js \;

          # 4. Copy your HTML from the demo root
          cp index.html dist/index.html

          # 5. Copy assets from the assets/ folder
          # Based on your image, these are in demo/assets/
          cp assets/favicon.ico dist/favicon.ico || echo "Favicon not found in assets/"
          cp assets/dictionary.txt dist/dictionary.txt || echo "Dictionary not found in assets/"

          # 6. Debug: Check the final structure
          echo "Deployment Structure:"
          ls -R dist/

          touch dist/.nojekyll
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./demo/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
