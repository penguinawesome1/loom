name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang & Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          gleam-version: "1.14.0"
          rebar3-version: "3.24.0"

      - name: Build Project
        working-directory: ./demo
        run: |
          gleam deps download
          # 1. Run the build (Lustre usually outputs to priv/static)
          gleam run -m lustre/dev build --minify --base-path /loom/

          # 2. Create our own dist folder
          mkdir -p dist

          # 3. Find the JS file in the actual Lustre output folder and move it to dist
          # Lustre puts the bundle in priv/static/
          cp priv/static/*.js dist/demo.js || find . -name "*.js" -exec cp {} dist/demo.js \;

          # 4. Copy your custom HTML and assets into dist
          cp index.html dist/index.html
          cp favicon.ico dist/favicon.ico || true

          # 5. Final check to prove it worked in the logs
          echo "Files inside the dist folder to be deployed:"
          ls -R dist/

          touch dist/.nojekyll
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./demo/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
